<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>منصة تقويم البرامج التدريبية</title><style>:root{--b:#173f8a;--t:#078481;--bg:#f5f7fb}*{box-sizing:border-box}body{margin:0;font-family:Tahoma,Arial;background:var(--bg);color:#17233b}button,input,select,textarea{font:inherit}button{cursor:pointer;border:0}.login{min-height:100vh;display:grid;place-items:center;background:linear-gradient(135deg,#112d68,#008a85)}.box{width:min(430px,92vw);padding:34px;background:white;border-radius:24px;text-align:center;box-shadow:0 25px 70px #001b4788}.logo{font-size:49px}.box h1{font-size:22px}.box p,small{color:#667085}.box input{width:100%;padding:13px;border:1px solid #d8deea;border-radius:10px;margin:7px 0;direction:ltr}.primary{background:linear-gradient(90deg,var(--b),var(--t));color:white;padding:12px 18px;border-radius:10px;font-weight:bold}.box .primary{width:100%;margin:14px 0}.accounts button{margin:3px;padding:6px;background:#edf4ff;color:var(--b);border-radius:7px;font-size:11px}.app{display:flex;min-height:100vh}aside{width:255px;flex-shrink:0;background:linear-gradient(#112d68,#08797b);color:#dceeff;padding:17px;display:flex;flex-direction:column;gap:6px}.brand{font-weight:bold;padding:12px;border-bottom:1px solid #ffffff20;font-size:17px}.person{padding:15px 8px}.avatar{display:inline-grid;place-items:center;width:38px;height:38px;border-radius:50%;background:#ffffff31;color:white;margin-left:7px}.nav{background:transparent;color:#dceeff;text-align:right;padding:11px;border-radius:9px}.nav:hover,.nav.active{background:#ffffff1f;color:white}.logout{margin-top:auto;text-align:right;background:#ffffff12;color:#ffd0d0;padding:11px;border-radius:9px}main{padding:28px;flex:1;overflow:auto}header{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px}h2{margin:0;font-size:24px}header p{color:#667085;font-size:13px}.bell{background:white;border-radius:10px;padding:9px}.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:13px;margin-bottom:17px}.card,.panel{background:white;border:1px solid #e6ebf3;border-radius:15px;padding:18px;box-shadow:0 3px 12px #102a5310}.card b{display:block;color:var(--b);font-size:27px;margin-top:7px}.card span{font-size:24px}.grid{display:grid;grid-template-columns:2fr 1fr;gap:17px}.chart{height:180px;display:flex;align-items:end;justify-content:space-around;border-bottom:1px solid #d8dfeb}.bar{width:12%;background:linear-gradient(var(--t),var(--b));border-radius:6px 6px 0 0}.score{text-align:center;font-size:50px;color:#d89100;padding:35px}.score small{display:block;font-size:12px}.row{border-top:1px solid #edf0f5;padding:12px 2px}.tag{float:left;background:#ddf7e9;color:#087443;padding:4px 9px;border-radius:20px;font-size:11px}.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin:0 0 15px}.toolbar input,.toolbar select{padding:9px;border:1px solid #d9e0ea;border-radius:8px;background:white}.table{width:100%;border-collapse:collapse}.table th,.table td{padding:12px;text-align:right;border-bottom:1px solid #edf0f5;font-size:13px}.table th{background:#f8fafc;color:#60708a}.secondary{padding:9px 13px;border-radius:8px;background:#edf3ff;color:var(--b)}.danger{background:#fff0f0;color:#bf2424}.modal{position:fixed;inset:0;background:#00132977;display:grid;place-items:center;padding:15px;z-index:3}.modal>div{width:min(560px,96vw);max-height:90vh;overflow:auto;background:white;border-radius:17px;padding:22px}.modal input,.modal select,.modal textarea{width:100%;padding:10px;border:1px solid #d6dde8;border-radius:8px;margin:5px 0 12px}.questions label{display:block;padding:14px;border-bottom:1px solid #edf0f5;font-weight:bold}.questions textarea{height:70px}.progress{height:8px;background:#d9e3f0;border-radius:8px;overflow:hidden}.progress i{display:block;background:var(--t);height:100%;transition:.2s}.notice{background:#fff8db;padding:11px;border-radius:9px;margin:8px 0;font-size:13px}.hide{display:none}@media(max-width:750px){aside{width:62px;padding:9px}.brand,.person,.nav{font-size:0}.brand:first-letter,.nav:first-letter{font-size:20px}.avatar{margin:0}.person{padding:9px 1px}.logout{font-size:0}.logout:first-letter{font-size:18px}main{padding:16px}.cards{grid-template-columns:repeat(2,1fr)}.grid{grid-template-columns:1fr}.table{font-size:11px}.table th:nth-child(3),.table td:nth-child(3){display:none}}</style></head><body><div id="root"></div><script>const S={role:'ADMIN',name:'مدير النظام',users:[['مدير النظام','admin@training.com','ADMIN'],['أ. محمد العلي','trainer@training.com','TRAINER'],['سارة الأحمد','trainee@training.com','TRAINEE']],programs:[{id:1,name:'مهارات القيادة الإدارية',trainer:'أ. محمد العلي',days:5,status:'نشط',rating:4.3}],notes:[{id:1,title:'تقييم يومي جديد',text:'تم استلام تقييم جديد لبرنامج القيادة',read:false},{id:2,title:'تذكير بالتقييم النهائي',text:'التقييم النهائي متاح الآن',read:false}],templates:['القالب اليومي الشامل','القالب النهائي الشامل']};const $=s=>document.querySelector(s);function save(){localStorage.tpep=JSON.stringify(S)}function load(){try{Object.assign(S,JSON.parse(localStorage.tpep))}catch{}}load();function login(){let e=$('#email').value;let u=S.users.find(x=>x[1]===e)||S.users[0];S.name=u[0];S.role=u[2];save();app()}function loginPage(){$('#root').innerHTML=`<section class="login"><div class="box"><div class="logo">🏛️</div><h1>منصة تقويم البرامج التدريبية</h1><p>تقييم يومي ونهائي وتقارير ذكية</p><input id="email" value="admin@training.com" placeholder="البريد الإلكتروني"><input type="password" value="Admin@123"><button class="primary" onclick="login()">تسجيل الدخول ←</button><p>حسابات تجربة:</p><div class="accounts"><button onclick="$('#email').value='admin@training.com'">مدير</button><button onclick="$('#email').value='trainer@training.com'">مدرب</button><button onclick="$('#email').value='trainee@training.com'">متدرب</button></div></div></section>`}function nav(){let common=['📊 لوحة التحكم','📋 البرامج'];let admin=['👥 المستخدمون','📝 قوالب التقييم','📈 التقارير','🔔 الإشعارات'];let trainee=['📝 تقييم يومي','🏁 تقييم نهائي','🔔 الإشعارات'];return (S.role==='ADMIN'?[...common,...admin]:S.role==='TRAINER'?[...common,'⭐ التقييمات','📈 تقاريري','🔔 الإشعارات']:[...common,...trainee]).map(x=>`<button class="nav" data-page="${x.slice(3)}" onclick="page(this.dataset.page)">${x}</button>`).join('')}function app(){$('#root').innerHTML=`<div class="app"><aside><div class="brand">🏛️ منصة تقويم</div><div class="person"><span class="avatar">${S.name[0]}</span>${S.name}<br><small>${S.role==='ADMIN'?'مدير النظام':S.role==='TRAINER'?'مدرب':'متدرب'}</small></div>${nav()}<button class="logout" onclick="localStorage.removeItem('tpep');location.reload()">🚪 تسجيل الخروج</button></aside><main><header><div><h2 id="title">لوحة التحكم</h2><p>إدارة التقييمات والبرامج التدريبية بمرونة</p></div><button class="bell" onclick="page('الإشعارات')">🔔 <b>${S.notes.filter(x=>!x.read).length}</b></button></header><div id="content"></div></main></div>`;page('لوحة التحكم')}function page(p){$$s('.nav').forEach(x=>x.classList.toggle('active',x.dataset.page===p));$('#title').textContent=p;let c=$('#content');if(p==='لوحة التحكم')return dashboard(c);if(p==='البرامج')return programs(c);if(p==='المستخدمون')return users(c);if(p==='قوالب التقييم')return templates(c);if(p.includes('تقييم يومي'))return evaluation(c,'يومي');if(p.includes('تقييم نهائي'))return evaluation(c,'نهائي');if(p.includes('إشعارات'))return notes(c);if(p.includes('تقارير'))return reports(c);c.innerHTML='<div class="panel">هذه الصفحة جاهزة للربط بالبيانات.</div>'}function $$s(s){return [...document.querySelectorAll(s)]}function dashboard(c){let st=S.role==='TRAINEE'?[['📚','برامجي','1'],['📝','يومية','2'],['🏁','نهائية','0'],['⭐','تقدمي','40%']]:[['📋','البرامج',S.programs.length],['👥','المتدربون',S.users.filter(x=>x[2]==='TRAINEE').length],['📝','التقييمات','18'],['⭐','متوسط الرضا','4.3']];c.innerHTML=`<div class="cards">${st.map(x=>`<div class="card"><span>${x[0]}</span><small>${x[1]}</small><b>${x[2]}</b></div>`).join('')}</div><div class="grid"><div class="panel"><h3>📈 اتجاه التقييمات الأسبوعية</h3><div class="chart">${[55,80,67,92,74,86].map(x=>`<i class="bar" style="height:${x}%"></i>`).join('')}</div></div><div class="panel"><h3>⭐ الرضا العام</h3><div class="score">4.3<small>من 5</small></div></div></div><div class="panel" style="margin-top:17px"><h3>📋 أحدث البرامج</h3>${S.programs.map(p=>`<div class="row"><b>${p.name}</b><span class="tag">${p.status}</span><br><small>المدرب: ${p.trainer} · ${p.days} أيام · ⭐ ${p.rating}</small></div>`).join('')}</div>`}function programs(c){c.innerHTML=`<div class="toolbar">${S.role==='ADMIN'?'<button class="primary" onclick="programForm()">+ برنامج جديد</button>':''}<input placeholder="بحث في البرامج" oninput="filterPrograms(this.value)"></div><div class="panel"><table class="table"><thead><tr><th>البرنامج</th><th>المدرب</th><th>الأيام</th><th>الحالة</th><th>إجراء</th></tr></thead><tbody id="pt">${S.programs.map(prow).join('')}</tbody></table></div>`}function prow(p){return `<tr><td>${p.name}</td><td>${p.trainer}</td><td>${p.days}</td><td><span class="tag">${p.status}</span></td><td><button class="secondary" onclick="reports($('#content'))">تقرير</button></td></tr>`}function filterPrograms(q){$('#pt').innerHTML=S.programs.filter(p=>p.name.includes(q)).map(prow).join('')}function programForm(){modal(`<h3>إضافة برنامج تدريبي</h3><label>اسم البرنامج</label><input id="pn"><label>المدرب</label><input id="tr" value="أ. محمد العلي"><label>عدد الأيام</label><input id="dy" type="number" value="5"><button class="primary" onclick="addProgram()">حفظ البرنامج</button>`)}function addProgram(){S.programs.push({id:Date.now(),name:$('#pn').value||'برنامج جديد',trainer:$('#tr').value,days:+$('#dy').value,status:'مسودة',rating:0});save();close();page('البرامج')}function users(c){c.innerHTML=`<div class="toolbar"><button class="primary" onclick="userForm()">+ إضافة مستخدم</button><input placeholder="بحث بالاسم أو البريد" oninput="filterUsers(this.value)"></div><div class="panel"><table class="table"><thead><tr><th>الاسم</th><th>البريد</th><th>الدور</th><th>الحالة</th></tr></thead><tbody id="ut">${S.users.map(u=>`<tr><td>${u[0]}</td><td>${u[1]}</td><td>${u[2]}</td><td><span class="tag">نشط</span></td></tr>`).join('')}</tbody></table></div>`}function filterUsers(q){$('#ut').innerHTML=S.users.filter(u=>u[0].includes(q)||u[1].includes(q)).map(u=>`<tr><td>${u[0]}</td><td>${u[1]}</td><td>${u[2]}</td><td><span class="tag">نشط</span></td></tr>`).join('')}function userForm(){modal(`<h3>إضافة مستخدم</h3><input id="un" placeholder="الاسم الكامل"><input id="ue" placeholder="البريد الإلكتروني"><select id="ur"><option>TRAINEE</option><option>TRAINER</option><option>ADMIN</option></select><button class="primary" onclick="addUser()">حفظ</button>`)}function addUser(){S.users.push([$('#un').value||'مستخدم جديد',$('#ue').value||'new@training.com',$('#ur').value]);save();close();page('المستخدمون')}function templates(c){c.innerHTML=`<div class="toolbar"><button class="primary" onclick="templateForm()">+ قالب جديد</button></div><div class="panel">${S.templates.map((t,i)=>`<div class="row">📝 <b>${t}</b><button class="secondary" style="float:left" onclick="alert('الأسئلة: تقييم النجوم، نعم/لا، اختيار متعدد، نص حر')">معاينة</button></div>`).join('')}</div>`}function templateForm(){modal(`<h3>قالب تقييم جديد</h3><input id="tn" placeholder="اسم القالب"><select id="tt"><option>يومي</option><option>نهائي</option></select><button class="primary" onclick="S.templates.push($('#tn').value||'قالب جديد');save();close();page('قوالب التقييم')">حفظ</button>`)}function evaluation(c,type){let q=type==='يومي'?['ما مدى وضوح المادة التدريبية؟','كيف تقيّم أداء المدرب؟','هل كان الوقت المخصص كافياً؟','ملاحظاتك واقتراحاتك']:['مدى شمولية محتوى البرنامج؟','مدى إلمام المدرب بالموضوع؟','جودة التنظيم الإداري؟','هل توصي بالبرنامج لزملائك؟','اقتراحاتك للتطوير'];c.innerHTML=`<div class="panel"><h3>📝 التقييم ${type}</h3><p>برنامج مهارات القيادة الإدارية</p><div class="progress"><i id="prog" style="width:0"></i></div><div class="questions">${q.map((x,i)=>`<label>${i+1}. ${x}${i===2&&type==='يومي'?'<select class="ans"><option value="">اختر</option><option>نعم</option><option>لا</option></select>':i===3&&type==='نهائي'?'<select class="ans"><option value="">اختر</option><option>نعم بالتأكيد</option><option>ربما</option><option>لا</option></select>':i===3&&type==='يومي'||i===4&&type==='نهائي'?'<textarea class="ans" placeholder="اكتب ملاحظاتك"></textarea>':`<div>${[1,2,3,4,5].map(n=>`<button class="secondary ans" onclick="this.parentElement.querySelectorAll('button').forEach(x=>x.style.background='');this.style.background='#9fe4df';progress()">⭐ ${n}</button>`).join('')}</div>`}</label>`).join('')}</div><button class="primary" onclick="submitEval('${type}')">إرسال التقييم ${type}</button></div>`}function progress(){let a=$$s('.ans').filter(x=>x.value||x.style.background);$('#prog').style.width=Math.round(a.length/5*100)+'%'}function submitEval(t){S.notes.unshift({id:Date.now(),title:'تم إرسال التقييم',text:`تم حفظ التقييم ${t} بنجاح`,read:false});save();alert('✅ شكراً لك، تم إرسال تقييمك بنجاح');page('لوحة التحكم')}function notes(c){c.innerHTML=`<div class="toolbar"><button class="secondary" onclick="S.notes.forEach(n=>n.read=true);save();page('الإشعارات')">قراءة الكل</button></div><div class="panel">${S.notes.map(n=>`<div class="row" style="background:${n.read?'':'#f0f7ff'}"><b>🔔 ${n.title}</b><br><small>${n.text}</small><button class="danger" style="float:left" onclick="S.notes=S.notes.filter(x=>x.id!==${n.id});save();page('الإشعارات')">حذف</button></div>`).join('')||'<p>لا توجد إشعارات</p>'}</div>`}function reports(c){let p=S.programs[0];c.innerHTML=`<div class="toolbar"><button class="primary" onclick="exportCSV()">⬇ تصدير Excel (CSV)</button><button class="secondary" onclick="window.print()">🖨 طباعة</button></div><div class="cards"><div class="card"><small>المتدربون</small><b>30</b></div><div class="card"><small>إكمال يومي</small><b>87%</b></div><div class="card"><small>إكمال نهائي</small><b>73%</b></div><div class="card"><small>الرضا</small><b>4.3/5</b></div></div><div class="panel"><h3>تقرير: ${p?.name||'البرنامج'}</h3><div class="row">المحتوى التدريبي <span>4.5 / 5</span></div><div class="row">أداء المدرب <span>4.7 / 5</span></div><div class="row">التنظيم والإدارة <span>3.9 / 5</span></div></div>`}function exportCSV(){let a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent('المحور,المتوسط\nالمحتوى,4.5\nالمدرب,4.7\nالتنظيم,3.9');a.download='training-report.csv';a.click()}function modal(x){document.body.insertAdjacentHTML('beforeend',`<div class="modal" id="modal"><div>${x}<button class="secondary" onclick="close()">إلغاء</button></div></div>`)}function close(){$('#modal')?.remove()}loginPage()</script></body></html>
